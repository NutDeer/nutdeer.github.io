name: Deploy Zola site to Pages

on:
  push:
    branches: [ main ]

# 开启 GitHub Pages 官方的高级部署权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保完整拉取主题代码

      # 使用官方原生构建，告别 Docker 报错
      - name: Setup Zola
        uses: getzola/setup-zola@v2
        with:
          zola-version: '0.19.2' 

      - name: Build site
        run: zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4