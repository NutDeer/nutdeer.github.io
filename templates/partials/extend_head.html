{% if config.extra.enable_mathjax %}
  {% if page.extra.mathjax %}
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        ignoreHtmlClass: "no-mathjax",
        processHtmlClass: "mathjax"
      }
    };
  </script>
  {% endif %}
{% endif %}

<style>
    /* 导航栏整体设置 */
    .header {
        position: relative !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        z-index: 1;
    }

    .header .nav {
        justify-content: flex-end !important;
        padding-top: 0px; /* 调整这个值可以改变右侧菜单的高度 */
        padding-bottom: 20px;
    }

    /* 修复左侧悬浮 Logo 的对齐和位置 */
    .logo {
        position: fixed !important;
        /* 【关键：垂直对齐】 */
        /* 如果觉得 NutD'Blog 还是偏低，把 top 从 20px 改成 18px 或 16px */
        top: 15px; 
        
        /* 【关键：水平位置】往左挪，减小 500px 后面的负偏移量即可 */
        /* 比如原来是 -40px，现在改成 -80px 会更靠左 */
        left: max(10px, calc(50% - 500px - 60px)); 

        display: flex !important;
        align-items: center !important; /* 强制内部元素垂直居中对齐 */
        gap: 4px; /* Logo文字和月亮之间的间距 */
        
        z-index: 1001;
        background: var(--bg); /* 确保背景遮挡滚动文字 */
        padding: 4px 12px;
        border-radius: 4px;
    }

    /* 确保右侧菜单也垂直居中 */
    #menu {
        display: flex;
        align-items: center;
        margin-left: auto !important;
    }

    #menu li {
        display: flex;
        align-items: center;
    }

    /* 响应式：窗口太小时隐藏左侧悬浮 */
    @media screen and (max-width: 1150px) {
        .logo {
            display: none !important;
        }
    }
</style>

<style>
/* 容器与切换按钮 */
.journal-container { margin-top: 40px; }
.view-switches { margin-bottom: 20px; display: flex; gap: 10px; }
.hidden { display: none !important; }

/* === 日历模式样式 === */
.calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}
.month-block { border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
.days-flex { display: flex; flex-wrap: wrap; gap: 4px; }
.day-cell {
    width: 12px; height: 12px; background: var(--tertiary); 
    position: relative; cursor: pointer; border-radius: 2px;
}
.day-cell:hover { background: var(--primary); }
/* 悬浮文字提示 */
.tooltip {
    visibility: hidden; width: 150px; background: var(--theme); color: var(--primary);
    text-align: left; padding: 8px; border: 1px solid var(--border);
    position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%);
    font-size: 12px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.day-cell:hover .tooltip { visibility: visible; }

/* === Git 时间轴模式 (从下往上) === */
.git-timeline {
    display: flex;
    flex-direction: column-reverse; /* 关键：强制从下往上排列 */
    border-left: 2px solid var(--border);
    margin-left: 50px;
    padding-left: 20px;
}
.timeline-item {
    display: flex; align-items: flex-start; margin-bottom: 20px; position: relative;
}
.timeline-item::before {
    content: ""; position: absolute; left: -27px; top: 8px;
    width: 12px; height: 12px; background: var(--primary); border-radius: 50%;
}
.year-box {
    background: var(--primary); color: var(--theme); padding: 4px 8px;
    font-weight: bold; border-radius: 4px; margin-right: 15px; min-width: 60px;
}
.date-label { min-width: 60px; font-weight: bold; color: var(--secondary); margin-right: 20px; }
.log-content { background: var(--entry); padding: 10px 15px; border-radius: 6px; flex: 1; }
</style>
